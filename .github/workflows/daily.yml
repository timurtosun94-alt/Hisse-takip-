name: Daily Report
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate report.json
        run: node Scan.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit report.json
        run: |
          git config user.name "report-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.json
          git commit -m "daily report" || echo "no changes"
          git push
